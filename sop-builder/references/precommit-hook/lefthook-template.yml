# lefthook.yml — PreCommit Hook 配置模板
# 安装：brew install lefthook && lefthook install
# 文档：https://github.com/evilmartians/lefthook
#
# 适用于希望使用 lefthook 替代 .githooks/ 方案的项目。
# 两种方案任选其一，详见 install.md。

pre-commit:
  parallel: true
  commands:
    # 1. 构建检查
    build:
      # Go 项目
      run: go build ./...
      # Node 项目：run: npm run build --if-present
      # Python 项目：run: python -m py_compile {staged_files}
      fail_text: "build 失败，请修复编译错误后再提交"

    # 2. Lint 检查
    lint:
      # Go 项目
      run: golangci-lint run --fast --timeout 60s
      # Node 项目：run: npx eslint {staged_files}
      # Python 项目：run: ruff check {staged_files}
      fail_text: "lint 不通过，请修复代码风格问题"

    # 3. 单元测试
    test:
      # Go 项目
      run: go test ./... -count=1 -timeout 60s
      # Node 项目：run: npm test
      # Python 项目：run: pytest --timeout=60
      fail_text: "单测失败，请修复测试后再提交"

    # 4. 代码格式化检查
    fmt:
      # Go 项目
      run: test -z "$(gofmt -l .)"
      # Node 项目：run: npx prettier --check {staged_files}
      # Python 项目：run: ruff format --check {staged_files}
      fail_text: "代码未格式化，请运行格式化工具后再提交"

    # 5. 敏感文件检查（通用）
    no-secrets:
      run: |
        SENSITIVE_PATTERNS=".env|.pem|.key|credentials|secret|password|token"
        if echo "{staged_files}" | grep -iE "$SENSITIVE_PATTERNS"; then
          echo "检测到敏感文件，请从暂存区移除"
          exit 1
        fi
      fail_text: "检测到敏感文件，请从暂存区移除后再提交"

    # 6. 生成物检查（不提交 vendor/dist/node_modules）
    no-generated:
      glob: "vendor/**|dist/**|node_modules/**|*.pyc|__pycache__/**"
      run: echo "检测到生成物被加入暂存区" && exit 1
      fail_text: "禁止提交 vendor/dist/node_modules 等生成物"

    # 7. AI 测试断言篡改检查
    no-test-mutation:
      # Go 项目
      glob: "**/*_test.go"
      # Node 项目：glob: "**/*.test.{ts,js}|**/__tests__/**"
      # Python 项目：glob: "**/test_*.py|**/*_test.py"
      run: |
        for file in {staged_files}; do
          MODIFIED_ASSERTS=$(git diff --cached -U0 "$file" | grep -E "^-.*\b(assert|require|expect|assertEqual)\b" | wc -l)
          if [ "$MODIFIED_ASSERTS" -gt 0 ]; then
            echo "WARNING: $file 中已有断言被修改（$MODIFIED_ASSERTS 处）"
            echo "如确需修改，请在 commit message 中加 [test-modify] 标记"
            exit 1
          fi
        done
      fail_text: "检测到已有测试断言被修改，需人工确认后豁免"

commit-msg:
  commands:
    # 8. Commit message 格式检查（含单号）
    msg-format:
      run: |
        MSG=$(cat {1})
        # 检查格式：<type>: [TAPD-XXXX] 描述 或 <type>: [JIRA-XXXX] 描述
        if ! echo "$MSG" | head -1 | grep -qE "^(feat|fix|refactor|test|docs|chore|perf|ci|build): \[.+\]"; then
          # 允许 hotfix 和 merge commit 豁免
          if ! echo "$MSG" | head -1 | grep -qE "^\[hotfix\]|^Merge"; then
            echo "commit message 格式不正确"
            echo "格式：<type>: [TAPD-XXXX] 描述"
            echo "type: feat|fix|refactor|test|docs|chore|perf|ci|build"
            exit 1
          fi
        fi
      fail_text: "commit message 缺少单号，格式：feat: [TAPD-XXXX] 描述"
